<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="MemeForge">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="110" r="120" fill="#f59e0b" opacity=".18"/>
  <circle cx="180" cy="530" r="180" fill="#22c55e" opacity=".12"/>
  <rect x="70" y="70" width="1060" height="490" rx="40" fill="url(#panel)" stroke="#8b5cf6" stroke-width="4"/>
  <rect x="110" y="112" width="410" height="410" rx="28" fill="#0f172a" stroke="#22c55e" stroke-width="6"/>
  <rect x="150" y="154" width="330" height="320" rx="22" fill="#111827"/>
  <text x="315" y="250" text-anchor="middle" fill="#fff" font-family="Impact, Arial Black, sans-serif" font-size="68" font-weight="700">MEME</text>
  <text x="315" y="330" text-anchor="middle" fill="#f59e0b" font-family="Impact, Arial Black, sans-serif" font-size="88" font-weight="700">FORGE</text>
  <text x="315" y="392" text-anchor="middle" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="24">Créer. Animer. Partager.</text>
  <text x="710" y="220" fill="#fff" font-family="Impact, Arial Black, sans-serif" font-size="72" font-weight="700">Quand le mème</text>
  <text x="710" y="306" fill="#a78bfa" font-family="Impact, Arial Black, sans-serif" font-size="86" font-weight="700">devient sérieux</text>
  <text x="710" y="384" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="30">éditeur de mèmes, stickers et GIFs</text>
  <text x="710" y="432" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="22">WebP animé, GIF, bibliothèque perso, partage social</text>
</svg>
